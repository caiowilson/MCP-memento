name: Move Server Latest

on:
  push:
    tags:
      - "server/v*"
  workflow_dispatch:
    inputs:
      server_tag:
        description: Server release tag to mirror to server/latest
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      server_tag: ${{ steps.meta.outputs.server_tag }}
      tag_sha: ${{ steps.tag_sha.outputs.tag_sha }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Resolve source tag and version
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ github.event.inputs.server_tag }}
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_TAG="$PUSH_TAG"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SOURCE_TAG="$DISPATCH_TAG"
          fi

          case "$SOURCE_TAG" in
            server/v*) ;;
            *)
              echo "expected a server/v* tag, got: $SOURCE_TAG" >&2
              exit 1
              ;;
          esac

          VERSION="${SOURCE_TAG#server/v}"

          echo "server_tag=$SOURCE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.server_tag }}

      - name: Resolve release commit
        id: tag_sha
        shell: bash
        run: |
          set -euo pipefail
          TAG_SHA=$(git rev-list -n 1 "${{ steps.meta.outputs.server_tag }}")
          if [ -z "$TAG_SHA" ]; then
            echo "could not resolve commit for ${{ steps.meta.outputs.server_tag }}" >&2
            exit 1
          fi
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"

      - name: Update server/latest tag
        shell: bash
        run: |
          git tag -f server/latest "${{ steps.tag_sha.outputs.tag_sha }}"
          git push -f origin refs/tags/server/latest

  build-binaries:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.server_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          ARCH_LABEL="$GOARCH"
          if [ "$GOARCH" = "amd64" ]; then ARCH_LABEL="x64"; fi
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -o "dist/memento-mcp_${GOOS}_${ARCH_LABEL}${EXT}" ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  build-deb:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.server_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH="${{ matrix.goarch }}" \
            go build -o dist/memento-mcp ./cmd/server

      - name: Build .deb package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          GOARCH="${{ matrix.goarch }}"

          ROOT="pkgroot-${GOARCH}"
          rm -rf "$ROOT"
          mkdir -p "$ROOT/DEBIAN" "$ROOT/usr/local/bin"

          install -m 0755 dist/memento-mcp "$ROOT/usr/local/bin/memento-mcp"

          printf '%s\n' \
            "Package: memento-mcp" \
            "Version: ${VERSION}" \
            "Section: utils" \
            "Priority: optional" \
            "Architecture: ${GOARCH}" \
            "Maintainer: memento-mcp maintainers" \
            "Description: Local-first MCP server for durable codebase memory" \
            > "$ROOT/DEBIAN/control"

          dpkg-deb --build "$ROOT" "dist/memento-mcp_${VERSION}_linux_${GOARCH}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.goarch }}
          path: dist/*.deb

  build-macos-pkg:
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.server_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH="${{ matrix.goarch }}" \
            go build -o dist/memento-mcp ./cmd/server

      - name: Build .pkg package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          GOARCH="${{ matrix.goarch }}"

          ROOT="pkgroot-darwin-${GOARCH}"
          rm -rf "$ROOT"
          mkdir -p "$ROOT/usr/local/bin"
          install -m 0755 dist/memento-mcp "$ROOT/usr/local/bin/memento-mcp"

          pkgbuild \
            --root "$ROOT" \
            --identifier "com.caiowilson.memento-mcp" \
            --version "$VERSION" \
            --install-location "/" \
            "dist/memento-mcp_${VERSION}_darwin_${GOARCH}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.goarch }}
          path: dist/*.pkg

  publish:
    needs: [prepare, build-binaries, build-deb, build-macos-pkg]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish server/latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server/latest
          name: server/latest
          target_commitish: ${{ needs.prepare.outputs.tag_sha }}
          prerelease: true
          files: dist/*
